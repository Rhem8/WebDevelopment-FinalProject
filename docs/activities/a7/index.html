<!DOCTYPE html>
<html>
<head>
    <title>Activity 8</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <h1>CHANGE | QUIZ | ANIMATE</h1>
        <hr>
    </header>

      <div class="container">

        <!-- COLOR CHANGER -->
        <div class="section color-box">
            <h2>Color Changer</h2>
            <button id="colorBtn">Change Background Color</button>
        </div>

        <!-- QUIZ -->
        <div class="section quiz-box">
            <h2>Mini Funny Quiz</h2>

            <p>Guess my favorite food:</p>
            <input type="text" id="answerInput" placeholder="Type here...">
            <button id="submitBtn">Submit Answer</button>

            <p id="result"></p>
        </div>

        <!-- ANIMATION -->
        <div class="section animation-box">
            <h2>Animation</h2>
            <button id="animateBtn">Start Animation</button>
            <div id="box"></div>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
